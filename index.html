<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>UNO スコア</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --uno-red: #ED1C24;
  --uno-blue: #0956BF;
  --uno-green: #00A651;
  --uno-yellow: #F5C518;
  --bg: #fafaf8;
  --card: #ffffff;
  --card-alt: #f7f6f3;
  --ink: #1a1a1a;
  --ink2: #7a7a7a;
  --border: #e8e6e1;
  --shadow: rgba(0,0,0,0.06);
  --radius: 14px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Zen Maru Gothic', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100dvh;
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden;
}

/* ── Screens ── */
.screen { display: none !important; }
.screen.active { display: block !important; }
#setupStep1.active, #setupStep2.active {
  display: flex !important;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100dvh;
  padding: 24px 16px;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(237,28,36,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 0%, rgba(9,86,191,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 100%, rgba(0,166,81,0.04) 0%, transparent 50%),
    var(--bg);
}
#gameScreen.active { padding-bottom: calc(76px + env(safe-area-inset-bottom, 0px)); }

/* ── Logo ── */
.logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  margin-bottom: 6px;
}

.logo-pill {
  display: inline-block;
  font-weight: 900;
  font-size: 1.5rem;
  color: white;
  padding: 2px 10px;
  border-radius: 20px;
  letter-spacing: -0.5px;
  line-height: 1.4;
}

.logo-text {
  font-weight: 900;
  font-size: 1.5rem;
  color: var(--ink);
  letter-spacing: -0.5px;
}

/* ── Setup Card ── */
.setup-card {
  background: var(--card);
  border-radius: 20px;
  padding: 28px 22px;
  width: min(92vw, 380px);
  box-shadow: 0 2px 16px var(--shadow), 0 0 0 1px var(--border);
  animation: cardUp 0.5s cubic-bezier(0.34, 1.4, 0.64, 1) both;
}

@keyframes cardUp {
  from { opacity: 0; transform: translateY(24px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.setup-subtitle {
  text-align: center;
  color: var(--ink2);
  font-size: 0.9rem;
  margin-bottom: 20px;
  font-weight: 400;
}

/* Player chips */
.player-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 16px;
  min-height: 20px;
}

.player-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: 700;
  color: white;
  animation: chipPop 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

@keyframes chipPop {
  from { opacity: 0; transform: scale(0.6); }
  to { opacity: 1; transform: scale(1); }
}

.player-chip button {
  background: rgba(255,255,255,0.3);
  border: none;
  color: white;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  font-size: 0.7rem;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.chip-red { background: var(--uno-red); }
.chip-blue { background: var(--uno-blue); }
.chip-green { background: var(--uno-green); }
.chip-yellow { background: #d4a800; }

/* Add player row */
.add-row {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}

.add-row input {
  flex: 1;
  min-width: 0;
  background: var(--card-alt);
  border: 2px solid var(--border);
  border-radius: 10px;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.9rem;
  padding: 10px 14px;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s;
}

.add-row input:focus { border-color: var(--uno-blue); }
.add-row input::placeholder { color: #bbb; }

.add-row button {
  background: var(--card-alt);
  border: 2px solid var(--border);
  border-radius: 10px;
  padding: 10px 16px;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  cursor: pointer;
  color: var(--uno-blue);
  white-space: nowrap;
  flex-shrink: 0;
  transition: background 0.15s;
}

.add-row button:active { background: var(--border); }

/* Round selector */
.round-section {
  margin-bottom: 20px;
}

.round-label {
  font-size: 0.85rem;
  color: var(--ink2);
  margin-bottom: 8px;
  text-align: center;
}

.round-picker {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.round-opt {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  border: 2px solid var(--border);
  background: var(--card);
  font-family: 'Zen Maru Gothic', sans-serif;
  font-weight: 900;
  font-size: 1rem;
  color: var(--ink);
  cursor: pointer;
  transition: all 0.15s;
}

.round-opt.selected {
  background: var(--uno-blue);
  border-color: var(--uno-blue);
  color: white;
  transform: scale(1.08);
}

.round-opt:active { transform: scale(0.92); }

.round-opt-free {
  padding: 0 12px;
  width: auto;
  font-size: 0.8rem;
  font-weight: 700;
}

/* Start button */
.btn-start {
  width: 100%;
  background: var(--uno-green);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 14px;
  font-family: 'Zen Maru Gothic', sans-serif;
  font-weight: 900;
  font-size: 1rem;
  cursor: pointer;
  box-shadow: 0 3px 12px rgba(0,166,81,0.3);
  transition: transform 0.15s, box-shadow 0.15s;
  letter-spacing: 0.5px;
}

.btn-start:active { transform: scale(0.97); box-shadow: 0 1px 6px rgba(0,166,81,0.2); }
.btn-start:disabled { opacity: 0.35; cursor: default; box-shadow: none; }

.setup-hint {
  text-align: center;
  color: var(--ink2);
  font-size: 0.72rem;
  margin-top: 10px;
}

/* ── Game Header ── */
.game-header {
  text-align: center;
  padding: 20px 16px 8px;
  animation: cardUp 0.4s cubic-bezier(0.34, 1.4, 0.64, 1) both;
}

.game-status {
  color: var(--ink2);
  font-size: 0.78rem;
  margin-top: 2px;
}

/* Progress bar */
.progress-wrap {
  margin: 8px 20px 0;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--uno-green), var(--uno-blue));
  transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
}

/* ── Score Table ── */
.table-wrapper {
  overflow-x: auto;
  margin: 14px 12px;
  border-radius: var(--radius);
  background: var(--card);
  box-shadow: 0 1px 10px var(--shadow), 0 0 0 1px var(--border);
  -webkit-overflow-scrolling: touch;
}

table {
  width: 100%;
  min-width: max-content;
  border-collapse: collapse;
  font-variant-numeric: tabular-nums;
}

thead th {
  position: sticky;
  top: 0;
  background: var(--card-alt);
  font-weight: 700;
  font-size: 0.7rem;
  color: var(--ink2);
  padding: 10px 10px;
  white-space: nowrap;
  border-bottom: 2px solid var(--border);
  z-index: 2;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

th:nth-child(1), td:nth-child(1) {
  position: sticky; left: 0; z-index: 3; background: var(--card);
}
th:nth-child(2), td:nth-child(2) {
  position: sticky; left: var(--name-col-width, 90px); z-index: 3; background: var(--card);
}
thead th:nth-child(1), thead th:nth-child(2) {
  z-index: 4; background: var(--card-alt);
}

td {
  padding: 10px 10px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  font-size: 0.95rem;
}

td:first-child {
  text-align: left;
  font-weight: 700;
  font-size: 0.9rem;
  padding-left: 14px;
}

/* Color stripes */
.uno-color-0 td:first-child { border-left: 4px solid var(--uno-red); }
.uno-color-1 td:first-child { border-left: 4px solid var(--uno-blue); }
.uno-color-2 td:first-child { border-left: 4px solid var(--uno-green); }
.uno-color-3 td:first-child { border-left: 4px solid var(--uno-yellow); }

/* Rank */
.col-rank { min-width: 44px; padding: 6px 6px; }

.rank-badge {
  display: inline-flex;
  align-items: center;
  font-size: 0.72rem;
  font-weight: 900;
  padding: 3px 9px;
  border-radius: 10px;
}

.rank-1 .rank-badge { background: #FFF3D0; color: #D4920B; }
.rank-2 .rank-badge { background: #F0F0EE; color: #777; }
.rank-3 .rank-badge { background: #FDEAE4; color: #C44A1A; }
.rank-other .rank-badge { background: var(--card-alt); color: var(--ink2); }

.col-total { font-weight: 900; font-size: 1rem; }

/* Score cells */
.score-cell {
  cursor: pointer;
  min-width: 52px;
  transition: background 0.15s;
  position: relative;
}

.score-cell:hover { background: var(--card-alt); }

.score-cell input {
  width: 50px;
  background: var(--card-alt);
  border: 2px solid var(--uno-blue);
  border-radius: 8px;
  color: var(--ink);
  font-family: 'Zen Maru Gothic', sans-serif;
  font-weight: 700;
  font-size: 0.95rem;
  text-align: center;
  padding: 4px 2px;
  outline: none;
}

.score-cell input::-webkit-inner-spin-button,
.score-cell input::-webkit-outer-spin-button { -webkit-appearance: none; }

.zero-score { color: var(--uno-green); font-weight: 900; }

/* Animations */
@keyframes bounce {
  0% { transform: scale(1); }
  40% { transform: scale(1.15); }
  100% { transform: scale(1); }
}
.bounce { animation: bounce 0.3s ease; }

@keyframes slideIn {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}
.slide-in { animation: slideIn 0.3s ease both; }

@keyframes flipRank {
  0% { transform: rotateX(0); }
  50% { transform: rotateX(90deg); }
  100% { transform: rotateX(0); }
}
.flip { animation: flipRank 0.4s ease; }

/* ── Action Bar ── */
.action-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 10px 16px;
  padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
  background: var(--card);
  border-top: 1px solid var(--border);
  z-index: 10;
}

@supports not (padding: env(safe-area-inset-bottom)) {
  .action-bar { padding-bottom: 18px; }
}

.btn {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-weight: 700;
  font-size: 0.82rem;
  border: none;
  border-radius: 10px;
  padding: 10px 18px;
  cursor: pointer;
  transition: transform 0.12s;
}

.btn:active { transform: scale(0.94); }

.btn-primary {
  background: var(--uno-blue);
  color: white;
  box-shadow: 0 2px 8px rgba(9,86,191,0.2);
}

.btn-secondary {
  background: var(--card-alt);
  color: var(--ink);
  border: 1px solid var(--border);
}

.btn-ghost {
  background: none;
  border: none;
  color: var(--ink2);
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  padding: 8px 6px;
  transition: color 0.15s;
}

.btn-ghost:hover { color: var(--uno-red); }

/* ── Modals ── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.25);
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-overlay.active { display: flex; }

.modal {
  background: var(--card);
  border-radius: 20px;
  padding: 24px;
  width: min(90vw, 360px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.12);
  animation: cardUp 0.3s ease both;
}

.modal h2 {
  font-weight: 900;
  font-size: 1rem;
  margin-bottom: 16px;
  text-align: center;
}

.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

.modal-input {
  width: 100%;
  background: var(--card-alt);
  border: 2px solid var(--border);
  border-radius: 10px;
  color: var(--ink);
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.95rem;
  padding: 10px 14px;
  outline: none;
  margin-bottom: 16px;
}
.modal-input:focus { border-color: var(--uno-blue); }

/* Confirm body */
.confirm-body {
  text-align: center;
  margin-bottom: 20px;
  line-height: 1.6;
  font-size: 0.92rem;
}
.confirm-body .icon { font-size: 2rem; margin-bottom: 8px; }

/* ── Celebration ── */
.celebration-overlay {
  display: none; position: fixed; inset: 0; z-index: 200; pointer-events: none;
}
.celebration-overlay.active {
  display: flex; align-items: center; justify-content: center;
  pointer-events: auto;
}
.celebration-overlay .celeb-bg {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, rgba(255,255,255,0.95) 0%, rgba(255,248,225,0.92) 50%, rgba(255,255,255,0.85) 100%);
  animation: celebBgIn 0.3s ease both;
}
@keyframes celebBgIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.celebration-overlay canvas {
  position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1;
}

.celebration-text {
  position: relative; z-index: 2;
  transform: scale(0);
  text-align: center;
  animation: celebPop 0.6s 0.15s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
.celebration-text .panpaka {
  font-weight: 900; font-size: 2rem; color: var(--ink);
  text-shadow: 0 0 30px rgba(245,197,24,0.4);
  white-space: nowrap;
  animation: celebPulse 0.6s 0.8s ease both;
}
.celebration-text .winner-label {
  font-weight: 700; font-size: 0.8rem; color: var(--ink2);
  margin-top: 10px; letter-spacing: 2px; text-transform: uppercase;
}
.celebration-text .winner-name {
  font-weight: 900; font-size: 1.5rem; color: var(--uno-green);
  margin-top: 2px;
  text-shadow: 0 0 20px rgba(0,166,81,0.3);
}
.celebration-text .emojis {
  font-size: 3rem; margin-top: 12px;
  animation: celebEmojiBounce 0.8s 0.6s ease both;
}

@keyframes celebPop {
  to { transform: scale(1); }
}
@keyframes celebPulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}
@keyframes celebEmojiBounce {
  0% { transform: translateY(20px); opacity: 0; }
  60% { transform: translateY(-5px); opacity: 1; }
  100% { transform: translateY(0); opacity: 1; }
}

/* ── Game Complete ── */
.game-complete-banner {
  text-align: center;
  padding: 20px 16px;
  margin: 0 12px 14px;
  background: linear-gradient(135deg, #FFF8E1, #FFF3D0);
  border-radius: var(--radius);
  border: 2px solid #F5C518;
  animation: cardUp 0.4s ease both;
}
.game-complete-banner .gc-title {
  font-weight: 900;
  font-size: 1.1rem;
  color: #B8860B;
}
.game-complete-banner .gc-sub {
  font-size: 0.8rem;
  color: #B8860B;
  margin-top: 2px;
  opacity: 0.7;
}

/* ── Responsive ── */
@media (max-width: 400px) {
  .logo-pill, .logo-text { font-size: 1.3rem; }
  td:first-child { font-size: 0.82rem; padding-left: 10px; }
  .btn { padding: 10px 14px; font-size: 0.78rem; }
  .score-cell input { width: 44px; }
  .setup-card { padding: 22px 16px; }
  .round-opt { width: 38px; height: 38px; font-size: 0.9rem; }
}
</style>
</head>
<body>

<!-- ════ Setup Screen: Step 1 - Round Count ════ -->
<div id="setupStep1" class="screen active">
  <div class="setup-card">
    <div class="logo">
      <span class="logo-pill" style="background:var(--uno-red);">U</span>
      <span class="logo-pill" style="background:var(--uno-blue);">N</span>
      <span class="logo-pill" style="background:var(--uno-green);">O</span>
      <span class="logo-text">スコア</span>
    </div>
    <div class="setup-subtitle">何ラウンドやる？</div>

    <div class="round-section">
      <div class="round-picker" id="roundPicker">
        <button class="round-opt" data-rounds="1">1</button>
        <button class="round-opt" data-rounds="3">3</button>
        <button class="round-opt selected" data-rounds="5">5</button>
      </div>
      <div class="setup-hint" style="margin-top:10px;">あとで増やせるよ</div>
    </div>

    <button class="btn-start" id="btnToStep2">次へ</button>
  </div>
</div>

<!-- ════ Setup Screen: Step 2 - Player Names ════ -->
<div id="setupStep2" class="screen">
  <div class="setup-card">
    <div class="logo">
      <span class="logo-pill" style="background:var(--uno-red);">U</span>
      <span class="logo-pill" style="background:var(--uno-blue);">N</span>
      <span class="logo-pill" style="background:var(--uno-green);">O</span>
      <span class="logo-text">スコア</span>
    </div>
    <div class="setup-subtitle">誰が遊びますか？</div>

    <div class="player-chips" id="setupPlayerChips"></div>

    <div class="add-row">
      <input type="text" id="setupNameInput" placeholder="名前を入力" autocomplete="off">
      <button id="setupAddBtn">追加</button>
    </div>

    <button class="btn-start" id="btnStartGame">ゲーム開始</button>
    <div class="setup-hint">2人以上で開始できます</div>
  </div>
</div>

<!-- ════ Game Screen ════ -->
<div id="gameScreen" class="screen">
  <div class="game-header">
    <div class="logo">
      <span class="logo-pill" style="background:var(--uno-red);font-size:1rem;padding:1px 7px;">U</span>
      <span class="logo-pill" style="background:var(--uno-blue);font-size:1rem;padding:1px 7px;">N</span>
      <span class="logo-pill" style="background:var(--uno-green);font-size:1rem;padding:1px 7px;">O</span>
      <span class="logo-text" style="font-size:1rem;">スコア</span>
    </div>
    <div class="game-status" id="gameStatus"></div>
    <div class="progress-wrap" id="progressWrap" style="display:none;">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div id="gameCompleteBanner" style="display:none;"></div>

  <div class="table-wrapper">
    <table id="scoreTable">
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div class="action-bar">
    <button class="btn btn-primary" id="btnAddRound">ラウンド追加</button>
    <button class="btn btn-secondary" id="btnAddPlayer">参加者追加</button>
    <button class="btn-ghost" id="btnReset">最初から</button>
  </div>
</div>

<!-- Celebration Overlay -->
<div class="celebration-overlay" id="celebrationOverlay">
  <div class="celeb-bg"></div>
  <canvas id="celebCanvas"></canvas>
  <div class="celebration-text" id="celebrationText">
    <div class="emojis">🎉🎊🎆</div>
    <div class="panpaka">パンパカパーン！！</div>
    <div class="winner-label" id="celebWinnerLabel"></div>
    <div class="winner-name" id="celebWinner"></div>
  </div>
</div>

<!-- Add Player Modal -->
<div class="modal-overlay" id="modalAddPlayer">
  <div class="modal">
    <h2>参加者追加</h2>
    <input type="text" class="modal-input" id="inputPlayerName" placeholder="名前を入力" autocomplete="off">
    <div class="modal-actions">
      <button class="btn btn-secondary" id="btnCancelPlayer">キャンセル</button>
      <button class="btn btn-primary" id="btnConfirmPlayer">追加</button>
    </div>
  </div>
</div>

<!-- Confirm Reset Modal -->
<div class="modal-overlay" id="modalConfirmReset">
  <div class="modal">
    <div class="confirm-body">
      <div class="icon">🔄</div>
      すべてのスコアをリセットして<br>最初の画面に戻りますか？
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="btnCancelReset">キャンセル</button>
      <button class="btn btn-primary" style="background:var(--uno-red);" id="btnConfirmReset">最初から</button>
    </div>
  </div>
</div>

<script>
// ── State ──
const STORAGE_KEY = 'uno-score-tracker';
const CHIP_COLORS = ['chip-red', 'chip-blue', 'chip-green', 'chip-yellow'];

let state = loadState();
let previousRanks = {};
let playerColors = {};

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      if (!parsed.totalRounds) parsed.totalRounds = 0; // ∞ mode
      // Migration: rounds → totalRounds (旧データ互換)
      if (parsed.rounds !== undefined) {
        parsed.totalRounds = Math.max(parsed.totalRounds || 0, parsed.rounds || 0);
        delete parsed.rounds;
      }
      parsed.players.forEach(p => {
        if (!parsed.scores[p]) parsed.scores[p] = [];
      });
      return parsed;
    }
  } catch (e) { /* ignore */ }
  return null;
}

function saveState() {
  if (state) localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function clearState() {
  localStorage.removeItem(STORAGE_KEY);
  state = null;
  previousRanks = {};
  playerColors = {};
}

// ── Setup Screen ──
const setupStep1 = document.getElementById('setupStep1');
const setupStep2 = document.getElementById('setupStep2');
const gameScreen = document.getElementById('gameScreen');
let setupPlayers = [];
let setupRounds = 5;

function hideAllScreens() {
  setupStep1.classList.remove('active');
  setupStep2.classList.remove('active');
  gameScreen.classList.remove('active');
}

function showSetup() {
  hideAllScreens();
  setupStep1.classList.add('active');
  // Restore round picker selection
  document.querySelectorAll('.round-opt').forEach(o => {
    o.classList.toggle('selected', parseInt(o.dataset.rounds, 10) === setupRounds);
  });
}

function showStep2() {
  hideAllScreens();
  setupStep2.classList.add('active');
  renderSetupChips();
  setTimeout(() => document.getElementById('setupNameInput').focus(), 100);
}

function showGame() {
  hideAllScreens();
  gameScreen.classList.add('active');
  assignColors();
  lastCompletedRound = getLastCompleteRound();
  render();
}

function assignColors() {
  if (!state) return;
  state.players.forEach((p, i) => {
    if (!(p in playerColors)) playerColors[p] = i % 4;
  });
}

// Player chips
function renderSetupChips() {
  const wrap = document.getElementById('setupPlayerChips');
  wrap.innerHTML = '';
  setupPlayers.forEach((name, i) => {
    const chip = document.createElement('span');
    chip.className = `player-chip ${CHIP_COLORS[i % 4]}`;
    chip.style.animationDelay = `${i * 0.05}s`;
    chip.innerHTML = `${escapeHTML(name)}<button>×</button>`;
    chip.querySelector('button').onclick = () => {
      setupPlayers.splice(i, 1);
      renderSetupChips();
    };
    wrap.appendChild(chip);
  });
  document.getElementById('btnStartGame').disabled = setupPlayers.length < 2;
}

// Step 1: Round picker
document.getElementById('roundPicker').addEventListener('click', (e) => {
  const opt = e.target.closest('.round-opt');
  if (!opt) return;
  document.querySelectorAll('.round-opt').forEach(o => o.classList.remove('selected'));
  opt.classList.add('selected');
  setupRounds = parseInt(opt.dataset.rounds, 10);
});

document.getElementById('btnToStep2').addEventListener('click', () => {
  showStep2();
});

// Step 2: Player names
document.getElementById('setupAddBtn').addEventListener('click', addSetupPlayer);

// IME-aware Enter handling
let isComposing = false;
const setupNameInput = document.getElementById('setupNameInput');
setupNameInput.addEventListener('compositionstart', () => { isComposing = true; });
setupNameInput.addEventListener('compositionend', () => {
  isComposing = false;
});
setupNameInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !isComposing) addSetupPlayer();
});

function addSetupPlayer() {
  const input = document.getElementById('setupNameInput');
  const name = input.value.trim();
  if (!name || setupPlayers.includes(name)) { input.value = ''; return; }
  setupPlayers.push(name);
  input.value = '';
  renderSetupChips();
  input.focus();
}

// Start game
document.getElementById('btnStartGame').addEventListener('click', () => {
  if (setupPlayers.length < 2) return;
  state = {
    players: [...setupPlayers],
    totalRounds: setupRounds,
    scores: {}
  };
  state.players.forEach(p => state.scores[p] = []);
  saveState();
  showGame();
});

// ── Derived ──

// ラウンド r が完了しているか（全員スコア入力済み）
function isRoundComplete(r) {
  return state.players.every(p => {
    const v = (state.scores[p] || [])[r];
    return v !== undefined && v !== null;
  });
}

// 最後の完了ラウンドのインデックス（連続して完了している最後）
function getLastCompleteRound() {
  let last = -1;
  for (let r = 0; r < (state.totalRounds || 0); r++) {
    if (isRoundComplete(r)) last = r;
    else break;
  }
  return last;
}

// 完了ラウンドまでの合計（ソート・順位用）
function getCompletedTotal(player) {
  const last = getLastCompleteRound();
  let sum = 0;
  for (let r = 0; r <= last; r++) {
    sum += (state.scores[player] || [])[r] || 0;
  }
  return sum;
}

// 全スコアの合計（表示用）
function getTotal(player) {
  return (state.scores[player] || []).reduce((a, b) => a + (b || 0), 0);
}

function getSortedPlayers() {
  return [...state.players].sort((a, b) => getCompletedTotal(a) - getCompletedTotal(b));
}

// Competition ranking (1224方式): 同点は同順位、次の順位はその分飛ばす
// 完了ラウンドがない場合は全員 null（順位なし）
function getRanks() {
  const hasCompleted = getLastCompleteRound() >= 0;
  const sorted = getSortedPlayers();
  const ranks = {};
  if (!hasCompleted) {
    sorted.forEach(p => ranks[p] = null);
    return ranks;
  }
  let rank = 1;
  for (let i = 0; i < sorted.length; i++) {
    if (i > 0 && getCompletedTotal(sorted[i]) > getCompletedTotal(sorted[i - 1])) rank = i + 1;
    ranks[sorted[i]] = rank;
  }
  return ranks;
}

const RANK_EMOJI = { 1: '🥇', 2: '🥈', 3: '🥉' };

function isGameComplete() {
  if (!state || state.totalRounds === 0) return false;
  return state.totalRounds > 0 && getLastCompleteRound() === state.totalRounds - 1;
}

// ── Render ──
function render(options = {}) {
  if (!state) return;
  const { newRound = false } = options;
  const ranks = getRanks();
  const sorted = getSortedPlayers();
  const complete = isGameComplete();

  // Status
  const completedRounds = getLastCompleteRound() + 1;
  const totalLabel = state.totalRounds > 0 ? ` / ${state.totalRounds}` : '';
  const roundLabel = completedRounds === 0 ? 'スタート前' : `${completedRounds}${totalLabel} ラウンド`;
  document.getElementById('gameStatus').textContent =
    `${roundLabel} — ${state.players.length}人で対戦中`;

  // Progress bar
  const progressWrap = document.getElementById('progressWrap');
  if (state.totalRounds > 0) {
    progressWrap.style.display = 'block';
    const pct = Math.min(100, (completedRounds / state.totalRounds) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
  } else {
    progressWrap.style.display = 'none';
  }

  // Game complete banner
  const banner = document.getElementById('gameCompleteBanner');
  if (complete) {
    const winner = sorted[0];
    banner.style.display = 'block';
    banner.className = 'game-complete-banner';
    banner.innerHTML = `<div class="gc-title">🏆 ゲーム終了！優勝: ${escapeHTML(winner)}</div><div class="gc-sub">「ラウンド追加」で延長もできます</div>`;
  } else {
    banner.style.display = 'none';
  }

  // Button label
  const btnRound = document.getElementById('btnAddRound');
  btnRound.textContent = 'ラウンド追加';

  // Name col width
  document.getElementById('scoreTable').style.setProperty('--name-col-width', '90px');

  // Table head — show totalRounds columns
  const thead = document.getElementById('tableHead');
  const displayCols = state.totalRounds || 0;
  let headHTML = '<tr><th></th><th>順位</th>';
  for (let r = 1; r <= displayCols; r++) {
    const cls = newRound && r === displayCols ? ' class="slide-in"' : '';
    headHTML += `<th${cls}>${r}回目</th>`;
  }
  headHTML += '<th>合計</th>';
  headHTML += '</tr>';
  thead.innerHTML = headHTML;

  // Table body
  const tbody = document.getElementById('tableBody');
  let bodyHTML = '';
  sorted.forEach((player) => {
    const colorIdx = playerColors[player] || 0;
    const total = getTotal(player);
    const rank = ranks[player];
    const rankChanged = previousRanks[player] !== undefined && previousRanks[player] !== rank;

    bodyHTML += `<tr class="uno-color-${colorIdx}">`;
    bodyHTML += `<td>${escapeHTML(player)}</td>`;

    if (rank === null) {
      bodyHTML += `<td class="col-rank"><span class="rank-badge" style="color:var(--ink2);">-</span></td>`;
    } else {
      const emoji = RANK_EMOJI[rank] || '';
      const label = emoji || `${rank}位`;
      const rankCls = rank <= 3 ? `rank-${rank}` : 'rank-other';
      const flipCls = rankChanged ? ' flip' : '';
      bodyHTML += `<td class="col-rank ${rankCls}${flipCls}"><span class="rank-badge">${label}</span></td>`;
    }

    for (let r = 0; r < displayCols; r++) {
      const val = (state.scores[player] || [])[r];
      const hasValue = val !== undefined && val !== null;
      const isZero = val === 0;
      const cls = newRound && r === displayCols - 1 ? ' slide-in' : '';
      const zeroCls = isZero ? ' zero-score' : '';
      bodyHTML += `<td class="score-cell${cls}" data-player="${escapeAttr(player)}" data-round="${r}"${!hasValue ? ' style="opacity:0.3;"' : ''}>`;
      if (hasValue) {
        bodyHTML += `<span class="${zeroCls}">${isZero ? '★' : val}</span>`;
      } else {
        bodyHTML += `<span>-</span>`;
      }
      bodyHTML += '</td>';
    }

    bodyHTML += `<td class="col-total">${total}</td>`;
    bodyHTML += '</tr>';
  });
  tbody.innerHTML = bodyHTML;

  requestAnimationFrame(() => {
    const firstTd = tbody.querySelector('td:first-child');
    if (firstTd) {
      document.getElementById('scoreTable').style.setProperty('--name-col-width', firstTd.offsetWidth + 'px');
    }
  });

  previousRanks = ranks;
  saveState();
}

// ── Score Editing ──
document.getElementById('scoreTable').addEventListener('click', (e) => {
  const cell = e.target.closest('.score-cell');
  if (!cell || cell.querySelector('input')) return;

  const player = cell.dataset.player;
  const round = parseInt(cell.dataset.round, 10);
  const currentVal = (state.scores[player] || [])[round];

  const input = document.createElement('input');
  input.type = 'number';
  input.inputMode = 'numeric';
  input.min = '0';
  input.value = currentVal !== undefined ? currentVal : '';
  cell.textContent = '';
  cell.appendChild(input);
  input.focus();
  input.select();

  const commit = () => {
    const raw = input.value.trim();
    const val = raw === '' ? undefined : Math.max(0, parseInt(raw, 10) || 0);
    if (!state.scores[player]) state.scores[player] = [];
    while (state.scores[player].length <= round) state.scores[player].push(undefined);
    state.scores[player][round] = val;
    render();
    requestAnimationFrame(() => {
      const newCell = document.querySelector(
        `.score-cell[data-player="${CSS.escape(player)}"][data-round="${round}"]`
      );
      if (newCell) {
        newCell.classList.add('bounce');
        newCell.addEventListener('animationend', () => newCell.classList.remove('bounce'), { once: true });
      }
      checkRoundComplete();
    });
  };

  input.addEventListener('blur', commit);
  input.addEventListener('keydown', (ev) => {
    if (ev.key === 'Enter') input.blur();
    if (ev.key === 'Escape') { input.removeEventListener('blur', commit); render(); }
  });
});

// ── Add Round ──
document.getElementById('btnAddRound').addEventListener('click', () => {
  state.totalRounds = (state.totalRounds || 0) + 1;
  render({ newRound: true });
});

// ── Add Player (mid-game) ──
const modalAdd = document.getElementById('modalAddPlayer');
const inputName = document.getElementById('inputPlayerName');

document.getElementById('btnAddPlayer').addEventListener('click', () => {
  inputName.value = '';
  inputName.placeholder = '名前を入力';
  modalAdd.classList.add('active');
  setTimeout(() => inputName.focus(), 100);
});

document.getElementById('btnCancelPlayer').addEventListener('click', () => {
  modalAdd.classList.remove('active');
});

document.getElementById('btnConfirmPlayer').addEventListener('click', addPlayer);
inputName.addEventListener('keydown', (e) => { if (e.key === 'Enter') addPlayer(); });

function addPlayer() {
  const name = inputName.value.trim();
  if (!name) return;
  if (state.players.includes(name)) {
    inputName.value = '';
    inputName.placeholder = 'その名前は既にあります';
    return;
  }
  state.players.push(name);
  state.scores[name] = [];
  playerColors[name] = state.players.length - 1;
  modalAdd.classList.remove('active');
  render();
}

// ── Reset ──
const modalReset = document.getElementById('modalConfirmReset');

document.getElementById('btnReset').addEventListener('click', () => { modalReset.classList.add('active'); });
document.getElementById('btnCancelReset').addEventListener('click', () => { modalReset.classList.remove('active'); });

document.getElementById('btnConfirmReset').addEventListener('click', () => {
  const rememberedPlayers = state ? [...state.players] : [];
  clearState();
  modalReset.classList.remove('active');
  setupPlayers = rememberedPlayers;
  showSetup();
});

// Close modals on overlay click
[modalAdd, modalReset].forEach(modal => {
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });
});

// ── Celebration ──
let lastCompletedRound = -1;

function checkRoundComplete() {
  if (!state) return;
  const currentLast = getLastCompleteRound();
  if (currentLast <= lastCompletedRound) return;
  lastCompletedRound = currentLast;

  const gameFinished = isGameComplete();
  if (gameFinished) {
    render();
    const leader = getSortedPlayers()[0];
    showCelebration(leader);
  } else {
    animateReorder();
  }
}

// FLIP animation: 行の並び替えを1秒かけてアニメーション
function animateReorder() {
  const tbody = document.getElementById('tableBody');
  const rows = [...tbody.querySelectorAll('tr')];

  // First: 現在の各行の位置を記録
  const firstPositions = {};
  rows.forEach(row => {
    const player = row.querySelector('td:first-child')?.textContent;
    if (player) firstPositions[player] = row.getBoundingClientRect().top;
  });

  // Re-render with new sort order
  render();

  // Last: 新しい位置を取得して差分アニメーション
  const newRows = [...tbody.querySelectorAll('tr')];
  newRows.forEach(row => {
    const player = row.querySelector('td:first-child')?.textContent;
    if (!player || firstPositions[player] === undefined) return;
    const lastTop = row.getBoundingClientRect().top;
    const delta = firstPositions[player] - lastTop;
    if (Math.abs(delta) < 1) return;
    row.style.transform = `translateY(${delta}px)`;
    row.style.transition = 'none';
    requestAnimationFrame(() => {
      row.style.transition = 'transform 1s cubic-bezier(0.22, 1, 0.36, 1)';
      row.style.transform = '';
      row.addEventListener('transitionend', () => {
        row.style.transition = '';
      }, { once: true });
    });
  });
}

function showCelebration(leader) {
  const overlay = document.getElementById('celebrationOverlay');
  const canvas = document.getElementById('celebCanvas');
  const text = document.getElementById('celebrationText');
  const winnerLabel = document.getElementById('celebWinnerLabel');
  const winnerName = document.getElementById('celebWinner');
  if (leader) {
    winnerLabel.textContent = '優勝';
    winnerName.textContent = leader;
  } else {
    winnerLabel.textContent = '';
    winnerName.textContent = '';
  }

  // Reset animations
  text.style.animation = 'none';
  text.querySelectorAll('.panpaka, .emojis').forEach(el => { el.style.animation = 'none'; });
  text.offsetHeight;
  text.style.animation = '';
  text.querySelectorAll('.panpaka, .emojis').forEach(el => { el.style.animation = ''; });

  overlay.classList.add('active');

  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const W = canvas.width, H = canvas.height;

  const particles = [];
  const colors = ['#ED1C24', '#0956BF', '#00A651', '#F5C518', '#FF6B9D', '#C77DFF', '#FFD700', '#FF4081', '#00E5FF'];

  // Firework bursts from 3 random points
  for (let b = 0; b < 3; b++) {
    const cx = W * (0.2 + Math.random() * 0.6);
    const cy = H * (0.15 + Math.random() * 0.3);
    const burstColor = colors[Math.floor(Math.random() * colors.length)];
    for (let i = 0; i < 40; i++) {
      const angle = (Math.PI * 2 * i) / 40 + (Math.random() - 0.5) * 0.3;
      const speed = 4 + Math.random() * 7;
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 3,
        size: 2 + Math.random() * 4, color: burstColor,
        life: 1, decay: 0.01 + Math.random() * 0.008,
        shape: 'circle', rotation: 0, rotSpeed: 0, trail: true,
      });
    }
  }

  // Confetti rain from top
  for (let i = 0; i < 80; i++) {
    particles.push({
      x: Math.random() * W,
      y: -20 - Math.random() * 200,
      vx: (Math.random() - 0.5) * 3,
      vy: 2 + Math.random() * 4,
      size: 4 + Math.random() * 6,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 1, decay: 0.003 + Math.random() * 0.004,
      shape: Math.random() > 0.3 ? 'rect' : 'circle',
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.3, trail: false,
    });
  }

  // Big golden stars
  for (let i = 0; i < 20; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H * 0.7,
      vx: (Math.random() - 0.5) * 1.5,
      vy: (Math.random() - 0.5) * 1.5,
      size: 10 + Math.random() * 12, color: '#FFD700',
      life: 1, decay: 0.005 + Math.random() * 0.005,
      shape: 'star', rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.08, trail: false,
    });
  }

  // Delayed secondary bursts
  let frame = 0;
  const delayedBursts = [
    { frame: 30, cx: W * 0.3, cy: H * 0.25 },
    { frame: 50, cx: W * 0.7, cy: H * 0.2 },
    { frame: 70, cx: W * 0.5, cy: H * 0.35 },
  ];

  let animId;
  function animate() {
    ctx.clearRect(0, 0, W, H);
    frame++;

    // Spawn delayed bursts
    for (const burst of delayedBursts) {
      if (frame === burst.frame) {
        const burstColor = colors[Math.floor(Math.random() * colors.length)];
        for (let i = 0; i < 30; i++) {
          const angle = (Math.PI * 2 * i) / 30;
          const speed = 3 + Math.random() * 5;
          particles.push({
            x: burst.cx, y: burst.cy,
            vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 2,
            size: 2 + Math.random() * 3, color: burstColor,
            life: 1, decay: 0.012 + Math.random() * 0.008,
            shape: 'circle', rotation: 0, rotSpeed: 0, trail: true,
          });
        }
      }
    }

    let alive = false;
    for (const p of particles) {
      if (p.life <= 0) continue;
      alive = true;
      p.x += p.vx; p.y += p.vy;
      p.vy += p.shape === 'rect' ? 0.04 : 0.1;
      p.life -= p.decay; p.rotation += p.rotSpeed;

      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;

      if (p.trail) {
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 8;
      }

      if (p.shape === 'circle') {
        ctx.beginPath(); ctx.arc(0, 0, p.size, 0, Math.PI * 2); ctx.fill();
      } else if (p.shape === 'rect') {
        ctx.fillRect(-p.size / 2, -p.size * 0.3, p.size, p.size * 0.6);
      } else if (p.shape === 'star') {
        drawStar(ctx, 0, 0, 5, p.size, p.size * 0.4); ctx.fill();
      }
      ctx.restore();
    }
    if (alive || frame < 80) animId = requestAnimationFrame(animate);
  }

  function drawStar(ctx, cx, cy, spikes, outerR, innerR) {
    ctx.beginPath();
    for (let i = 0; i < spikes * 2; i++) {
      const r = i % 2 === 0 ? outerR : innerR;
      const angle = (Math.PI * i) / spikes - Math.PI / 2;
      i === 0 ? ctx.moveTo(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r)
              : ctx.lineTo(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
    }
    ctx.closePath();
  }

  animate();
  const dismiss = () => {
    overlay.classList.remove('active');
    cancelAnimationFrame(animId);
    ctx.clearRect(0, 0, W, H);
    overlay.removeEventListener('click', dismiss);
  };
  overlay.addEventListener('click', dismiss);
  setTimeout(dismiss, 2000);
}

// ── Utils ──
function escapeHTML(str) {
  const d = document.createElement('div'); d.textContent = str; return d.innerHTML;
}
function escapeAttr(str) {
  return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;');
}

// ── Init ──
if (state && state.players && state.players.length > 0) {
  showGame();
} else {
  showSetup();
}

</script>
